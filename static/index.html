<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        input { padding: 8px; width: 70%; }
        button { padding: 8px 16px; cursor: pointer; }
        .task { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .done { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <h1>My Tasks</h1>

    <div>
        <input type="text" id="titleInput" placeholder="New task...">
        <button onclick="createTask()">Add</button>
    </div>

    <div id="taskList"></div>

    <script>
        const API = "/tasks";

        async function loadTasks() {
            const res = await fetch(API + "/");
            const tasks = await res.json();
            const list = document.getElementById("taskList");
            list.innerHTML = "";
            tasks.forEach(task => {
                const div = document.createElement("div");
                div.className = "task";
                div.innerHTML = `
                    <span class="${task.done ? 'done' : ''}">${task.title}</span>
                    ${!task.done ? `<button onclick="markDone(${task.id})">✓</button>` : ""}
                    <button onclick="deleteTask(${task.id})">✗</button>
                `;
                list.appendChild(div);
            });
        }

        async function createTask() {
            const input = document.getElementById("titleInput");
            if (!input.value.trim()) return;
            await fetch(API + "/", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({title: input.value})
            });
            input.value = "";
            loadTasks();
        }

        async function markDone(id) {
            await fetch(API + "/" + id + "/done", { method: "PATCH" });
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(API + "/" + id, { method: "DELETE" });
            loadTasks();
        }

        loadTasks();
    </script>
</body>
</html>
